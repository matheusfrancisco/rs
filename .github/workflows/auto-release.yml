name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

# Serialize runs so two PRs merged back-to-back can't both read the same
# "latest" tag and race on `gh release create`.
concurrency:
  group: auto-release-main
  cancel-in-progress: false

jobs:
  release:
    name: Tag & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve merged PR and bump type
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Ask GitHub which PR this pushed commit belongs to, rather than
          # parsing the commit subject. This is merge-strategy agnostic (works
          # for squash, merge-commit and rebase).
          #
          # GitHub links a commit to its PR asynchronously, so a push-triggered
          # run often queries before the just-merged commit is associated
          # (seen on back-to-back merges, where the link lands a few seconds
          # after the push). A single lookup then misreads a real merge as a
          # direct push and silently drops the release, so poll until the link
          # appears before giving up.
          PR_NUMBER=""
          attempts=8
          for attempt in $(seq 1 "$attempts"); do
            # gh exits non-zero only on a real API error, which should fail the
            # run. A valid "not linked yet" reply is an empty array, which
            # becomes an empty string here and drives another poll.
            PR_NUMBER=$(gh api "repos/${REPO}/commits/${SHA}/pulls" --jq '.[0].number // ""')
            [ -n "$PR_NUMBER" ] && break
            if [ "$attempt" -lt "$attempts" ]; then
              echo "No PR linked to ${SHA} yet (attempt ${attempt}/${attempts}); waiting 10s for GitHub to index it..."
              sleep 10
            fi
          done

          if [ -z "$PR_NUMBER" ]; then
            echo "No PR is associated with ${SHA} after polling (direct push to main?). Nothing to release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LABELS=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.labels[].name')

          if echo "$LABELS" | grep -qx 'skip-release'; then
            echo "PR #${PR_NUMBER} has 'skip-release' label — no release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP=$(echo "$LABELS" | grep -E '^(major|minor|patch)$' | head -1 || true)
          if [ -z "$BUMP" ]; then
            echo "::error::PR #${PR_NUMBER} has no major/minor/patch/skip-release label. (PR Release Label Check should have blocked this merge.)"
            exit 1
          fi

          echo "Merged PR: #${PR_NUMBER} (bump: ${BUMP})"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "bump=${BUMP}" >> "$GITHUB_OUTPUT"
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        if: steps.pr.outputs.skip == 'false'
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUMP: ${{ steps.pr.outputs.bump }}
        run: |
          set -euo pipefail
          # Highest existing semver release, not the most recently created, so an
          # out-of-order hotfix can't trick the bump. Go module tags must be
          # v-prefixed (vX.Y.Z) — that is what makes `go install ...@vX.Y.Z` work.
          LATEST=$(gh release list -L 30 --json tagName --jq '
            [.[].tagName | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))]
            | sort_by(sub("^v"; "") | split(".") | map(tonumber))
            | .[-1] // ""
          ')
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi

          CLEAN="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CLEAN"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEXT="v${MAJOR}.${MINOR}.${PATCH}"

          echo "Highest existing release: ${LATEST} -> Next: ${NEXT} (bump: ${BUMP})"
          echo "next=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "previous=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: steps.pr.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ steps.version.outputs.next }}
          PREVIOUS: ${{ steps.version.outputs.previous }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if gh release view "$NEXT" >/dev/null 2>&1; then
            echo "::error::Release $NEXT already exists. Another run may have created it; investigate before retrying."
            exit 1
          fi
          # Creating the release also creates the vNEXT tag at $SHA. That tag is
          # the published artifact: `go install github.com/hoophq/rs/cmd/rs@NEXT`.
          ARGS=(--title "$NEXT" --target "$SHA" --generate-notes)
          if [ "$PREVIOUS" != "v0.0.0" ]; then
            ARGS+=(--notes-start-tag "$PREVIOUS")
          fi
          gh release create "$NEXT" "${ARGS[@]}"
          echo "Released github.com/${{ github.repository }}@${NEXT}"
